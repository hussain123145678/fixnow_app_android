name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Create .env file from GitHub Secrets
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
        echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> .env
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
        echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
        echo "MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}" >> .env
        echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env

    - name: Grant execute permission for gradlew (if exists)
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        fi

    - name: Build Debug APK
      run: |
        if [ -f gradlew ]; then
          ./gradlew assembleDebug
        else
          gradle assembleDebug
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: fixnow-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
